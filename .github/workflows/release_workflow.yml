name: Release APK on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [dev]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: 🔧 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🌍 Install version_assist globally
        run: dart pub global activate version_assist

      - name: 📌 Get bump type from label
        id: get_bump
        run: |
          LABELS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels)
          if echo "$LABELS" | grep -q patch; then
            echo "bump=true" >> $GITHUB_OUTPUT
            echo "type=patch" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q minor; then
            echo "bump=true" >> $GITHUB_OUTPUT
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q major; then
            echo "bump=true" >> $GITHUB_OUTPUT
            echo "type=major" >> $GITHUB_OUTPUT
          else
            echo "bump=false" >> $GITHUB_OUTPUT
            echo "Aucun bump de version requis."
          fi

      - name: 📛 Set Git identity
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: 🆙 Bump version
        if: steps.get_bump.outputs.bump == 'true'
        run: dart pub global run version_assist bump --${{ steps.get_bump.outputs.type }} --add-build-number --auto-commit

      - name: 📋 Get new version
        if: steps.get_bump.outputs.bump == 'true'
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🛠️ Générer le fichier .env.production
        run: |
          mkdir -p assets/env
          echo "${{ secrets.ENV_PRODUCTION }}" > assets/env/.env.production

      - name: 📄 Créer .env.development (fictif pour éviter le crash)
        run: echo "" > assets/env/.env.development

      - name: 🛠 Build release APK
        if: steps.get_bump.outputs.bump == 'true'
        run: flutter build apk --flavor prod --release

      - name: 🚀 Push tag
        if: steps.get_bump.outputs.bump == 'true'
        run: |
          git push origin --tags
          git push

      - name: 🧾 Extract changelog from PR
        if: steps.get_bump.outputs.bump == 'true'
        id: changelog
        run: |
          BODY=$(jq -r .pull_request.body "$GITHUB_EVENT_PATH")
          CONTENT=$(printf "%s\n" "$BODY" | sed -n '/<!-- CHANGELOG:START -->/,/<!-- CHANGELOG:END -->/p' | sed '1d;$d')
          ESCAPED=$(echo "$CONTENT" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
          echo "log=$ESCAPED" >> $GITHUB_OUTPUT

      - name: 📝 Update version.json with changelog
        if: steps.get_bump.outputs.bump == 'true'
        run: dart run bin/update_version_json.dart
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APK_URL: https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/app-prod-release.apk
          NOTES: ${{ steps.changelog.outputs.log }}


      - name: 🔁 Commit version.json
        if: steps.get_bump.outputs.bump == 'true'
        run: |
          git add assets/version.json
          git commit -m "📝 Update version.json for ${{ steps.version.outputs.version }}" || echo "Nothing to commit"
          git push


      - name: 🚀 Create GitHub Release
        if: steps.get_bump.outputs.bump == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.log }}
          files: build/app/outputs/flutter-apk/app-prod-release.apk
