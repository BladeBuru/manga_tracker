name: Release APK on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [feature/cli-for-build-apk]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Checkout repo
        uses: actions/checkout@v3

      - name: 🔧 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🌍 Install version_assist globally
        run: dart pub global activate version_assist

      - name: 📌 Get bump type from label
        id: get_bump
        run: |
          LABELS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels)
          if echo "$LABELS" | grep -q patch; then
            echo "type=patch" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q minor; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q major; then
            echo "type=major" >> $GITHUB_OUTPUT
          else
            echo "❌ Aucun label de version trouvé."
            exit 1
          fi

      - name: 🆙 Bump version
        run: dart pub global run version_assist bump ${{ steps.get_bump.outputs.type }}

      - name: 📋 Get new version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🛠️ Générer le fichier .env.production
        run: |
          mkdir -p assets/env
          echo "${{ secrets.ENV_PRODUCTION }}" > assets/env/.env.production

      - name: 📄 Créer .env.development (fictif pour éviter le crash)
        run: echo "" > assets/env/.env.development

      - name: 🛠 Build release APK
        run: flutter build apk --flavor prod --release

      - name: 🏷 Commit and tag version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pubspec.yaml
          git commit -m "🔖 Release version ${{ steps.version.outputs.version }}"
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}
          git push

      - name: 🔁 Update version.json
        run: |
          echo '{
            "latestVersion": "${{ steps.version.outputs.version }}",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/app-release.apk"
          }' > version.json
          git add version.json
          git commit -m "📝 Update version.json for ${{ steps.version.outputs.version }}"
          git push

      - name: 🧾 Extract changelog from PR
        id: changelog
        run: |
          CHANGELOG=$(jq -r .pull_request.body "$GITHUB_EVENT_PATH" | sed -n '/<!-- CHANGELOG:START -->/,/<!-- CHANGELOG:END -->/p' | sed '1d;$d')
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.log }}
          files: build/app/outputs/flutter-apk/app-release.apk
