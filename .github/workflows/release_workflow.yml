name: Release APK

# Trois modes de déclenchement :
#  1. PR mergée sur `master` avec label `patch`/`minor`/`major` → flow PR
#  2. workflow_dispatch (manuel ou via skill `/release`) → flow direct
#  3. push direct sur `master` → release auto patch par défaut.
#     - `[bump minor]` ou `[bump major]` dans le commit message → override
#     - `[skip release]` dans le commit message → pas de release (juste le web/back déploient)
#     - Le changelog est le body du commit (tout ce qui suit la 1ère ligne vide).
#       À écrire en langage utilisateur (voir CLAUDE.md règle changelog).
#     - Les commits faits par le bot github-actions sont ignorés (anti-boucle).
on:
  pull_request:
    types: [closed]
    branches: [master]
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Type de bump de version'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      changelog:
        description: 'Changelog (markdown, lignes séparées par \n)'
        required: true
        type: string
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'memory-bank/**'
      - '.claude/**'
      - '.github/workflows/web-deploy.yml'

jobs:
  release:
    # Run si :
    #  - workflow_dispatch (toujours)
    #  - PR effectivement mergée
    #  - push direct master MAIS pas par le bot ET sans `[skip release]`
    if: |
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
      || (
        github.event_name == 'push'
        && github.event.head_commit.author.name != 'github-actions'
        && !contains(github.event.head_commit.message, '[skip release]')
      )
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Checkout repo
        uses: actions/checkout@v3
        with:
          # PAT avec scope `workflow` (RELEASE_PAT) — sans ça, GitHub bloque
          # le push si le rebase intègre des commits qui modifient
          # `.github/workflows/*.yml` (le GITHUB_TOKEN par défaut n'a pas
          # le droit de toucher aux workflows).
          token: ${{ secrets.RELEASE_PAT }}
          persist-credentials: true
          ref: master

      - name: 🔧 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🌍 Install version_assist globally
        run: dart pub global activate version_assist

      # ──────────────────────────────────────────────────────────────
      # Bump type : depuis input (workflow_dispatch) ou label (PR)
      # ──────────────────────────────────────────────────────────────
      - name: 📌 Get bump type
        id: get_bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump=true" >> $GITHUB_OUTPUT
            echo "type=${{ inputs.version_type }}" >> $GITHUB_OUTPUT
            echo "Source: workflow_dispatch (type=${{ inputs.version_type }})"
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Push direct master : parse le commit message pour `[bump X]`
            MSG=$(jq -r .head_commit.message "$GITHUB_EVENT_PATH")
            if echo "$MSG" | grep -qiE '\[bump[[:space:]]+major\]'; then
              TYPE=major
            elif echo "$MSG" | grep -qiE '\[bump[[:space:]]+minor\]'; then
              TYPE=minor
            else
              # Défaut : patch (le user peut écrire `[skip release]` pour éviter)
              TYPE=patch
            fi
            echo "bump=true" >> $GITHUB_OUTPUT
            echo "type=$TYPE" >> $GITHUB_OUTPUT
            echo "Source: push direct master (type=$TYPE)"
          else
            LABELS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels)
            if echo "$LABELS" | grep -q patch; then
              echo "bump=true" >> $GITHUB_OUTPUT
              echo "type=patch" >> $GITHUB_OUTPUT
            elif echo "$LABELS" | grep -q minor; then
              echo "bump=true" >> $GITHUB_OUTPUT
              echo "type=minor" >> $GITHUB_OUTPUT
            elif echo "$LABELS" | grep -q major; then
              echo "bump=true" >> $GITHUB_OUTPUT
              echo "type=major" >> $GITHUB_OUTPUT
            else
              echo "bump=false" >> $GITHUB_OUTPUT
              echo "Aucun bump de version requis (PR sans label patch/minor/major)."
            fi
          fi

      - name: 📛 Set Git identity
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: 🆙 Bump version
        if: steps.get_bump.outputs.bump == 'true'
        run: dart pub global run version_assist bump --${{ steps.get_bump.outputs.type }} --add-build-number --auto-commit

      - name: 📋 Get new version
        if: steps.get_bump.outputs.bump == 'true'
        id: version
        run: |
          VERSION_FULL=$(grep '^version:' pubspec.yaml | cut -d ' ' -f2)
          # Extraire uniquement la version sans le build (avant le +)
          VERSION=$(echo "$VERSION_FULL" | cut -d '+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_full=$VERSION_FULL" >> $GITHUB_OUTPUT

      - name: 🛠️ Générer les fichiers .env
        run: |
          mkdir -p assets/env
          echo "::add-mask::${{ secrets.ENV_PRODUCTION }}"
          printf '%s' "${{ secrets.ENV_PRODUCTION }}" > assets/env/.env.production
          test -f assets/env/.env.development || printf '' > assets/env/.env.development

      - name: ✅ Vérifier que l'env n'est pas vide (fail si vide)
        run: |
          test -s assets/env/.env.production || { echo "❌ .env.production vide"; exit 1; }
          wc -c assets/env/.env.production   # taille en octets

      - name: 🔐 Décode et prépare le keystore
        if: steps.get_bump.outputs.bump == 'true'
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "🔐 Décodage du keystore..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks
            echo "✅ Keystore décodé avec succès"
          else
            echo "⚠️ Aucun keystore configuré, utilisation de la clé debug"
          fi

      - name: 🛠 Build release APK
        if: steps.get_bump.outputs.bump == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --flavor prod --release

      - name: 🧹 Nettoyer le keystore (sécurité)
        if: steps.get_bump.outputs.bump == 'true'
        run: |
          if [ -f android/keystore.jks ]; then
            rm -f android/keystore.jks
            echo "✅ Keystore nettoyé"
          fi

      - name: 🏷️ Create and push tag (version only, no build)
        if: steps.get_bump.outputs.bump == 'true'
        run: |
          # Supprimer les tags locaux créés par version_assist (s'il y en a avec le build)
          git tag -d v${{ steps.version.outputs.version_full }} 2>/dev/null || true
          # Créer un nouveau tag avec uniquement la version (sans le build)
          git tag -a v${{ steps.version.outputs.version }} -m "Release v${{ steps.version.outputs.version }}"
          # Supprimer le tag avec build du remote s'il existe
          git push origin :refs/tags/v${{ steps.version.outputs.version_full }} 2>/dev/null || true

          # Garde-fou anti race condition : si master a divergé pendant le run
          # (ex: un autre push entre-temps), on rebase notre commit de bump
          # par-dessus. `pull --rebase` échoue proprement si conflit irréconciliable.
          git pull --rebase origin master

          # Pousser le tag avec uniquement la version, puis le commit de bump
          git push origin v${{ steps.version.outputs.version }}
          git push origin master

      # ──────────────────────────────────────────────────────────────
      # Changelog : depuis input (workflow_dispatch) ou PR body (PR)
      # ──────────────────────────────────────────────────────────────
      - name: 🧾 Get changelog
        if: steps.get_bump.outputs.bump == 'true'
        id: changelog
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Le \n littéral dans l'input est converti en vrai newline
            CONTENT=$(printf '%b' "${{ inputs.changelog }}")
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Push direct master : le changelog = body du commit (après la 1ère ligne vide).
            # Anti-bruit : on retire le tag `[bump X]` / `[skip release]` au passage.
            MSG=$(jq -r .head_commit.message "$GITHUB_EVENT_PATH")
            CONTENT=$(printf "%s\n" "$MSG" | awk '/^$/{found=1; next} found' \
              | sed -E 's/\[bump[[:space:]]+(patch|minor|major)\]//gi' \
              | sed -E 's/\[skip release\]//gi')
            if [ -z "$(echo "$CONTENT" | tr -d '[:space:]')" ]; then
              # Pas de body → fallback minimal user-friendly
              CONTENT="Diverses améliorations et corrections."
            fi
          else
            BODY=$(jq -r .pull_request.body "$GITHUB_EVENT_PATH")
            CONTENT=$(printf "%s\n" "$BODY" | sed -n '/<!-- CHANGELOG:START -->/,/<!-- CHANGELOG:END -->/p' | sed '1d;$d')
          fi
          ESCAPED=$(echo "$CONTENT" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
          echo "log=$ESCAPED" >> $GITHUB_OUTPUT
          # Print pour debug (sans secrets dedans)
          echo "─── Changelog ───"
          echo "$CONTENT"
          echo "─────────────────"

      - name: 📝 Update version.json with changelog
        if: steps.get_bump.outputs.bump == 'true'
        run: dart run bin/update_version_json.dart
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APK_URL: https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/MangaTracker.apk
          NOTES: ${{ steps.changelog.outputs.log }}


      - name: 🔁 Commit version.json
        if: steps.get_bump.outputs.bump == 'true'
        run: |
          git add assets/version.json
          git commit -m "📝 Update version.json for ${{ steps.version.outputs.version }}" || echo "Nothing to commit"
          # Idem ici : rebase si master a bougé pendant le build
          git pull --rebase origin master
          git push origin master


      - name: 🚀 Create GitHub Release
        if: steps.get_bump.outputs.bump == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.log }}
          files: build/app/outputs/flutter-apk/MangaTracker.apk
