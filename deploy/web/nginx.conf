# Nginx config — Manga Tracker Web (Flutter)
#
# Servi par NPMplus en amont (TrueNAS NAS) qui gère HTTPS pour app.bladeburu.com.
# Ce container écoute en HTTP simple sur le port 80.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────────
    # Compression gzip — drastique sur les .js Flutter (4.3 MB → ~1 MB)
    # ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/wasm
        application/xml
        application/xml+rss
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ─────────────────────────────────────────────────────────────
    # Headers de sécurité (CSP permissif pour Flutter CanvasKit + Google OAuth)
    # ─────────────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # CSP : autorise CanvasKit + Google OAuth + l'API en HTTPS
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline' https://www.gstatic.com https://accounts.google.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' data: https://fonts.gstatic.com;
        img-src 'self' data: blob: https: http:;
        connect-src 'self' https://api.bladeburu.com https://accounts.google.com https://www.googleapis.com https://cdn.mangaupdates.com;
        frame-src 'self' https://accounts.google.com;
        worker-src 'self' blob:;
        object-src 'none';
        base-uri 'self';
    " always;

    # ─────────────────────────────────────────────────────────────
    # PRIORITÉ ABSOLUE — fichiers Flutter qui changent à chaque release
    # sans avoir de hash dans le nom : on FORCE le no-cache.
    # `location =` (exact match) prime sur toutes les regex en Nginx
    # → empêche que la règle générique `*.js → 30d immutable` ci-dessous
    # n'attrape ces fichiers (sinon le navigateur sert l'ancien JS pendant
    # 30 jours après une mise à jour).
    # ─────────────────────────────────────────────────────────────
    location = /main.dart.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /assets/AssetManifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /assets/AssetManifest.bin {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /assets/FontManifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /assets/NOTICES {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    # .env files de Flutter (chargés par flutter_dotenv au runtime)
    location ~ ^/assets/assets/env/\.env\..* {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # ─────────────────────────────────────────────────────────────
    # Cache statique long pour les assets versionnés (icones, polices,
    # images, wasm — qui ont des hashes dans leur nom donc immutables).
    # Les fichiers spécifiques ci-dessus sont déjà matchés en priorité.
    # ─────────────────────────────────────────────────────────────
    location ~* \.(?:css|woff2?|ttf|otf|png|jpg|jpeg|gif|svg|webp|ico|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    # Les .js qui ne sont pas Flutter principal (par ex. canvaskit) → cache long
    location ~* \.js$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─────────────────────────────────────────────────────────────
    # SPA fallback — toute route inconnue retombe sur index.html
    # (utile quand go_router sera activé, sans casse pour MaterialPageRoute)
    # ─────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Healthcheck léger
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
