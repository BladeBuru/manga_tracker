<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Suivez votre lecture de mangas, gérez votre bibliothèque et téléchargez vos chapitres préférés.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Manga Tracker">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Manga Tracker</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Stockage du résultat Google OAuth (rempli par postMessage)
    window.__googleAuthResult = null;

    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'GOOGLE_AUTH_SUCCESS') {
        window.__googleAuthResult = {
          accessToken: event.data.accessToken,
          refreshToken: event.data.refreshToken
        };
      }
    });

    // Ouvre la popup Google OAuth SANS "noopener" pour que window.opener soit disponible.
    // Retourne false si le navigateur a bloqué la popup (window.open → null),
    // pour que l'app affiche un message au lieu d'attendre indéfiniment.
    window.openGoogleOAuthPopup = function(url) {
      var w = window.open(url, 'googleOAuth', 'width=520,height=640,left=200,top=100');
      return w !== null && typeof w !== 'undefined';
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
